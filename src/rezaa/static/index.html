<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>RezaaAI - Video Editor</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: linear-gradient(180deg, #2d1754 0%, #4a2080 30%, #e8dff5 70%, #ffffff 100%);
    background-attachment: fixed;
    color: #2d1b5e;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 2rem 1rem;
  }
  .container { max-width: 640px; width: 100%; }
  h1 { font-size: 1.75rem; text-align: center; margin-bottom: .25rem; }
  .title-glass {
    position: relative;
    display: inline-block;
    font-family: 'Outfit', sans-serif;
    font-weight: 800;
    font-size: 3rem;
    letter-spacing: 0.04em;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255, 255, 255, 0.4);
    filter: url(#liquid-distort);
    text-shadow:
      0 0 20px rgba(167, 139, 250, 0.4),
      0 0 40px rgba(139, 92, 246, 0.15);
  }
  .title-glass::before {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    color: transparent;
    -webkit-text-stroke: 0;
    text-shadow:
      0 -1px 1px rgba(255, 255, 255, 0.7),
      0 1px 2px rgba(139, 92, 246, 0.3);
  }
  .title-glass::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    background: linear-gradient(
      180deg,
      rgba(255, 255, 255, 0.35) 0%,
      rgba(167, 139, 250, 0.15) 50%,
      rgba(139, 92, 246, 0.25) 100%
    );
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-stroke: 0;
  }
  .subtitle { text-align: center; color: rgba(45, 27, 94, 0.7); font-size: .9rem; margin-bottom: 2rem; }
  .step {
    position: relative;
    background: rgba(255, 255, 255, 0.18);
    backdrop-filter: blur(24px) saturate(180%);
    -webkit-backdrop-filter: blur(24px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.45);
    border-top: 1px solid rgba(255, 255, 255, 0.7);
    border-radius: 20px;
    padding: 1.25rem;
    margin-bottom: 1rem;
    box-shadow:
      0 8px 32px rgba(100, 60, 180, 0.12),
      inset 0 1px 0 rgba(255, 255, 255, 0.5);
    overflow: hidden;
  }
  .step-header {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: .75rem;
    font-weight: 600;
    font-size: 1rem;
  }
  .step-number {
    background: rgba(167, 139, 250, 0.3);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(255, 255, 255, 0.4);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    width: 24px; height: 24px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .75rem;
    flex-shrink: 0;
  }
  .drop-zone {
    border: 2px dashed rgba(255, 255, 255, 0.4);
    border-radius: 12px;
    padding: 2rem 1rem;
    text-align: center;
    cursor: pointer;
    transition: border-color .2s, background .2s, box-shadow .2s;
    color: rgba(45, 27, 94, 0.7);
    font-size: .9rem;
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.3);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: rgba(255, 255, 255, 0.7);
    background: rgba(255, 255, 255, 0.22);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 0 20px rgba(167,139,250,0.15);
  }
  .drop-zone input { display: none; }
  .status-msg {
    margin-top: .5rem;
    font-size: .85rem;
    min-height: 1.2em;
  }
  .status-msg.ok { color: #16a34a; }
  .status-msg.err { color: #dc2626; }
  label { display: block; font-size: .85rem; color: rgba(45, 27, 94, 0.7); margin-bottom: .25rem; }
  select, input[type="number"] {
    width: 100%;
    padding: .5rem .75rem;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 12px;
    color: #2d1b5e;
    font-size: .9rem;
    margin-bottom: .75rem;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  select:focus, input[type="number"]:focus { outline: none; border-color: rgba(255, 255, 255, 0.7); box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 0 0 3px rgba(167, 139, 250, 0.2), 0 0 16px rgba(167, 139, 250, 0.1); }
  select option { background: #fff; color: #2d1b5e; }
  .pref-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 .75rem; }
  button.primary {
    width: 100%;
    padding: .75rem;
    background: linear-gradient(135deg, #7c3aed, #6d28d9);
    border: none;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.2);
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    box-shadow:
      0 4px 16px rgba(124, 58, 237, 0.4),
      0 2px 6px rgba(0, 0, 0, 0.15);
  }
  button.primary:hover { background: linear-gradient(135deg, #8b5cf6, #7c3aed); box-shadow: 0 6px 24px rgba(124, 58, 237, 0.5), 0 3px 8px rgba(0,0,0,0.2); transform: translateY(-1px); }
  button.primary:disabled { opacity: .5; cursor: not-allowed; }
  .progress-section { display: none; }
  .progress-section.visible { display: block; }
  .progress-bar-outer {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.3);
    border-radius: 8px;
    height: 12px;
    overflow: hidden;
    margin: .75rem 0 .5rem;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  .progress-bar-inner {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(167, 139, 250, 0.5), rgba(196, 181, 253, 0.6));
    border-radius: 6px;
    transition: width .4s ease;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: .85rem;
    color: rgba(45, 27, 94, 0.7);
  }
  .download-section { display: none; text-align: center; margin-top: 1rem; }
  .download-section.visible { display: block; }
  .download-section a {
    display: inline-block;
    padding: .75rem 2rem;
    background: rgba(22, 163, 74, 0.3);
    backdrop-filter: blur(16px) saturate(180%);
    -webkit-backdrop-filter: blur(16px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-top: 1px solid rgba(255, 255, 255, 0.5);
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.15);
    border-radius: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1rem;
    transition: all .2s;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.4), 0 4px 16px rgba(22, 163, 74, 0.15);
  }
  .download-section a:hover { background: rgba(22, 163, 74, 0.4); box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 6px 20px rgba(22, 163, 74, 0.2); }

  /* Audio section slider */
  .audio-section-step { display: none; }
  .audio-section-step.visible { display: block; }
  .audio-mode-toggle {
    display: flex;
    gap: 1rem;
    margin-bottom: .75rem;
  }
  .audio-mode-toggle label {
    display: flex;
    align-items: center;
    gap: .35rem;
    cursor: pointer;
    color: #2d1b5e;
    font-size: .9rem;
  }
  .audio-mode-toggle input[type="radio"] { accent-color: #7c3aed; }
  .waveform-container { display: none; }
  .waveform-container.visible { display: block; }
  .waveform-wrapper {
    position: relative;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-top: 1px solid rgba(255, 255, 255, 0.5);
    border-radius: 12px;
    height: 80px;
    overflow: hidden;
    touch-action: none;
    cursor: grab;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  .waveform-wrapper:active { cursor: grabbing; }
  #waveform-canvas { display: block; width: 100%; height: 100%; }
  .waveform-selection {
    position: absolute;
    top: 0;
    height: 100%;
    background: rgba(255, 255, 255, 0.18);
    border-left: 2px solid #fff;
    border-right: 2px solid #fff;
    box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.15), 0 0 8px rgba(255, 255, 255, 0.3);
    pointer-events: none;
  }
  .waveform-times {
    display: flex;
    justify-content: space-between;
    font-size: .8rem;
    color: rgba(45, 27, 94, 0.6);
    margin-top: .35rem;
  }
  .waveform-actions {
    display: flex;
    gap: .5rem;
    margin-top: .5rem;
  }
  button.secondary-btn {
    padding: .4rem .75rem;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    color: #7c3aed;
    border: 1px solid rgba(255, 255, 255, 0.4);
    border-top: 1px solid rgba(255, 255, 255, 0.6);
    border-radius: 10px;
    font-size: .85rem;
    cursor: pointer;
    transition: all .2s;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
  button.secondary-btn:hover { background: rgba(255, 255, 255, 0.25); box-shadow: inset 0 1px 0 rgba(255,255,255,0.5), 0 0 12px rgba(167,139,250,0.1); }
  .waveform-legend {
    display: flex;
    align-items: center;
    gap: .5rem;
    font-size: .75rem;
    color: rgba(45, 27, 94, 0.5);
    margin-top: .25rem;
  }
  .legend-dot {
    width: 8px; height: 8px;
    border-radius: 2px;
  }
  .legend-dot.high { background: rgba(139, 92, 246, 0.9); }
  .legend-dot.low { background: rgba(167, 139, 250, 0.35); }
  .clip-duration-row {
    display: flex;
    align-items: center;
    gap: .5rem;
    margin-bottom: .5rem;
  }
  .clip-duration-row label {
    margin-bottom: 0;
    white-space: nowrap;
    font-size: .85rem;
    color: rgba(45, 27, 94, 0.7);
  }
  .clip-duration-row input[type="number"] {
    width: 80px;
    margin-bottom: 0;
    padding: .35rem .5rem;
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: 1px solid rgba(255, 255, 255, 0.35);
    border-radius: 12px;
    color: #2d1b5e;
    font-size: .85rem;
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
  }
</style>
</head>
<body>
<svg style="position:absolute;width:0;height:0">
  <filter id="liquid-distort">
    <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise"/>
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</svg>
<div class="container">
  <h1><span class="title-glass" data-text="RezaaAI">RezaaAI</span></h1>

  <!-- Step 1: Upload Audio -->
  <div class="step">
    <div class="step-header"><span class="step-number">1</span> Upload Audio</div>
    <div class="drop-zone" id="audio-drop">
      <input type="file" id="audio-input" accept=".mp3,.wav,.aac,.m4a">
      Drop audio file here or click to browse<br><small>mp3, wav, aac, m4a</small>
    </div>
    <div class="status-msg" id="audio-status"></div>
  </div>

  <!-- Step 2: Audio Section (hidden until audio uploaded) -->
  <div class="step audio-section-step" id="audio-section-step">
    <div class="step-header"><span class="step-number">2</span> Audio Section</div>
    <div class="audio-mode-toggle">
      <label><input type="radio" name="audio-mode" value="auto" checked> Auto (best energy)</label>
      <label><input type="radio" name="audio-mode" value="manual"> Manual</label>
    </div>
    <div class="waveform-container" id="waveform-container">
      <div class="clip-duration-row">
        <label for="clip-duration">Clip Duration (s)</label>
        <input type="number" id="clip-duration" value="15" min="1" max="600" step="1">
      </div>
      <div class="waveform-wrapper" id="waveform-wrapper">
        <canvas id="waveform-canvas"></canvas>
        <div class="waveform-selection" id="waveform-selection"></div>
      </div>
      <div class="waveform-times">
        <span id="waveform-start-time">0:00</span>
        <span id="waveform-end-time">0:00</span>
      </div>
      <div class="waveform-legend">
        <span class="legend-dot high"></span> High energy
        <span class="legend-dot low"></span> Low energy
      </div>
      <div class="waveform-actions">
        <button class="secondary-btn" id="preview-btn" type="button">Preview</button>
      </div>
    </div>
    <audio id="audio-preview" preload="auto"></audio>
    <div class="status-msg" id="waveform-status"></div>
  </div>

  <!-- Step 3: Upload Videos -->
  <div class="step">
    <div class="step-header"><span class="step-number">3</span> Upload Video Clips</div>
    <div class="drop-zone" id="video-drop">
      <input type="file" id="video-input" accept=".mp4,.mov,.avi,.webm" multiple>
      Drop video files here or click to browse<br><small>mp4, mov, avi, webm &mdash; multiple allowed</small>
    </div>
    <div class="status-msg" id="video-status"></div>
  </div>

  <!-- Step 4: Preferences -->
  <div class="step">
    <div class="step-header"><span class="step-number">4</span> Preferences</div>
    <div class="pref-grid">
      <div>
        <label for="pacing">Pacing</label>
        <select id="pacing">
          <option value="fast">Fast</option>
          <option value="medium" selected>Medium</option>
          <option value="slow">Slow</option>
        </select>
      </div>
      <div>
        <label for="style">Style</label>
        <select id="style">
          <option value="dramatic">Dramatic</option>
          <option value="smooth" selected>Smooth</option>
          <option value="energetic">Energetic</option>
        </select>
      </div>
      <div>
        <label for="transition">Transition</label>
        <select id="transition">
          <option value="cut" selected>Cut</option>
          <option value="fade">Fade</option>
          <option value="crossfade">Crossfade</option>
          <option value="wipeleft">Wipe Left</option>
          <option value="wiperight">Wipe Right</option>
          <option value="slideleft">Slide Left</option>
          <option value="slideright">Slide Right</option>
          <option value="fadeblack">Fade Black</option>
          <option value="fadewhite">Fade White</option>
          <option value="dissolve">Dissolve</option>
          <option value="zoomin">Zoom In</option>
          <option value="circleopen">Circle Open</option>
          <option value="radial">Radial</option>
          <option value="ai_mix">AI Mix (auto)</option>
        </select>
      </div>
      <div>
        <label for="duration">Target Duration (s)</label>
        <input type="number" id="duration" value="30" min="5" max="600" step="1">
      </div>
    </div>
  </div>

  <!-- Step 5: Create Reel -->
  <div class="step">
    <div class="step-header"><span class="step-number">5</span> Create Reel</div>
    <button class="primary" id="create-btn" disabled>Create Reel</button>
    <div class="status-msg" id="process-status"></div>

    <div class="progress-section" id="progress-section">
      <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar"></div></div>
      <div class="progress-label">
        <span id="progress-stage">Waiting...</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="status-msg" id="progress-msg"></div>
    </div>

    <div class="download-section" id="download-section">
      <a id="download-link" href="#">Download Reel</a>
    </div>
  </div>
</div>

<script>
(function() {
  let jobId = null;
  let clipCount = 0;
  let pollTimer = null;

  // Waveform / audio section state
  let audioBuffer = null;
  let audioDuration = 0;
  let audioStartOffset = 0;
  let audioMode = 'auto';   // 'auto' | 'manual'
  let audioCtx = null;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartOffset = 0;
  let previewTimeout = null;
  let isPreviewPlaying = false;
  let audioAnalysis = null;

  const $ = id => document.getElementById(id);

  // --- Drop zone wiring ---
  function setupDrop(zoneId, inputId, handler) {
    const zone = $(zoneId);
    const input = $(inputId);
    zone.addEventListener('click', () => input.click());
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.classList.add('drag-over'); });
    zone.addEventListener('dragleave', () => zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e => {
      e.preventDefault();
      zone.classList.remove('drag-over');
      handler(e.dataTransfer.files);
    });
    input.addEventListener('change', () => { if (input.files.length) handler(input.files); });
  }

  function setStatus(id, text, ok) {
    const el = $(id);
    el.textContent = text;
    el.className = 'status-msg ' + (ok ? 'ok' : 'err');
  }

  function updateCreateBtn() {
    $('create-btn').disabled = !(jobId && clipCount > 0);
  }

  // --- Helpers ---
  function getTargetDuration() {
    return parseFloat($('duration').value) || 30;
  }

  function getClipDuration() {
    return parseFloat($('clip-duration').value) || 15;
  }

  function formatTime(sec) {
    const m = Math.floor(sec / 60);
    const s = Math.floor(sec % 60);
    return m + ':' + String(s).padStart(2, '0');
  }

  // --- Upload Audio ---
  async function handleAudio(files) {
    const file = files[0];
    const form = new FormData();
    form.append('file', file);
    setStatus('audio-status', 'Uploading...', true);
    try {
      const res = await fetch('/api/v1/upload/audio', { method: 'POST', body: form });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || data.message || 'Upload failed');
      jobId = data.job_id;
      clipCount = 0;
      setStatus('video-status', '', true);
      $('progress-section').classList.remove('visible');
      $('download-section').classList.remove('visible');
      setStatus('audio-status', `${data.filename} uploaded (Job: ${jobId})`, true);
      loadAudioForWaveform(jobId);
    } catch (e) {
      setStatus('audio-status', e.message, false);
    }
    updateCreateBtn();
  }

  // --- Energy & beat analysis (per-bar precision) ---
  function computeEnergyAndBeats(audioBuffer, barCount) {
    const data = audioBuffer.getChannelData(0);
    const samplesPerBar = Math.floor(data.length / barCount);

    // RMS energy per bar — matches 1:1 with rendered bars
    const rawEnergy = new Float32Array(barCount);
    for (let i = 0; i < barCount; i++) {
      let sum = 0;
      const start = i * samplesPerBar;
      const end = Math.min(start + samplesPerBar, data.length);
      for (let j = start; j < end; j++) sum += data[j] * data[j];
      rawEnergy[i] = Math.sqrt(sum / (end - start));
    }

    // Normalize with a local sliding window for contrast
    // Use a small window to get local max, then blend with global max
    const windowSize = Math.max(3, Math.floor(barCount / 30));
    const localMax = new Float32Array(barCount);
    for (let i = 0; i < barCount; i++) {
      let mx = 0;
      const lo = Math.max(0, i - windowSize);
      const hi = Math.min(barCount - 1, i + windowSize);
      for (let j = lo; j <= hi; j++) {
        if (rawEnergy[j] > mx) mx = rawEnergy[j];
      }
      localMax[i] = mx;
    }

    const globalMax = Math.max(...rawEnergy);
    const energy = new Float32Array(barCount);
    for (let i = 0; i < barCount; i++) {
      // Blend: 60% local normalization + 40% global for contrast
      const localNorm = localMax[i] > 0 ? rawEnergy[i] / localMax[i] : 0;
      const globalNorm = globalMax > 0 ? rawEnergy[i] / globalMax : 0;
      energy[i] = localNorm * 0.6 + globalNorm * 0.4;
    }

    // Beat detection: peaks in energy derivative above threshold
    const beats = new Set();
    for (let i = 2; i < barCount - 1; i++) {
      const diff = energy[i] - energy[i - 1];
      const prevDiff = energy[i - 1] - energy[i - 2];
      if (diff > 0.06 && prevDiff <= diff * 0.5 && energy[i] > 0.45) {
        beats.add(i);
      }
    }

    return { energy, beats };
  }

  // --- Waveform loading ---
  async function loadAudioForWaveform(jid) {
    pausePreview();
    try {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const resp = await fetch('/api/v1/audio/' + jid);
      if (!resp.ok) throw new Error('Failed to fetch audio');
      const arrayBuf = await resp.arrayBuffer();
      audioBuffer = await audioCtx.decodeAudioData(arrayBuf);
      audioDuration = audioBuffer.duration;
      audioStartOffset = 0;

      // Cap clip duration to audio length
      const clipDurInput = $('clip-duration');
      clipDurInput.max = Math.floor(audioDuration);
      if (parseFloat(clipDurInput.value) > audioDuration) {
        clipDurInput.value = Math.floor(audioDuration);
      }

      // Set audio element source for preview playback
      $('audio-preview').src = '/api/v1/audio/' + jid;

      // Show the audio section step
      $('audio-section-step').classList.add('visible');
      drawWaveform();
      updateSelectionOverlay();
      setStatus('waveform-status', '', true);
    } catch (e) {
      // Graceful degradation — hide slider, auto mode still works
      $('audio-section-step').classList.remove('visible');
      console.warn('Waveform decode failed:', e);
    }
  }

  // --- Rounded rect helper (fallback for browsers without roundRect) ---
  function drawRoundedRect(ctx, x, y, w, h, r) {
    if (ctx.roundRect) {
      ctx.beginPath();
      ctx.roundRect(x, y, w, h, r);
    } else {
      r = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
  }

  // --- Waveform drawing (Instagram-style) ---
  function drawWaveform() {
    if (!audioBuffer) return;
    const canvas = $('waveform-canvas');
    const wrapper = $('waveform-wrapper');
    const w = wrapper.clientWidth;
    const h = wrapper.clientHeight;
    if (w === 0 || h === 0) return;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = w * dpr;
    canvas.height = h * dpr;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    ctx.clearRect(0, 0, w, h);

    const data = audioBuffer.getChannelData(0);
    const barW = 2, gap = 1, barStep = barW + gap;
    const barCount = Math.floor(w / barStep);
    if (barCount <= 0) return;
    const samplesPerBar = Math.floor(data.length / barCount);
    const mid = h / 2;
    const maxBarH = mid - 2;

    // Recompute energy at bar-level resolution for precision
    audioAnalysis = computeEnergyAndBeats(audioBuffer, barCount);
    const analysis = audioAnalysis;

    for (let i = 0; i < barCount; i++) {
      // Compute peak amplitude for this bar
      let peak = 0;
      const start = i * samplesPerBar;
      const end = Math.min(start + samplesPerBar, data.length);
      for (let j = start; j < end; j++) {
        const abs = Math.abs(data[j]);
        if (abs > peak) peak = abs;
      }

      const energy = analysis.energy[i] || 0;
      const barH = Math.max(1, peak * maxBarH);

      // Color: smooth gradient from dim cool purple to bright vivid purple
      // energy 0→1 maps through: dim lavender → medium → bright violet
      const t = energy;
      const r = Math.round(167 - 28 * t);   // 167 → 139
      const g = Math.round(139 - 47 * t);   // 139 → 92
      const b = 250 - Math.round(4 * t);    // 250 → 246
      const a = 0.2 + 0.8 * t;              // 0.2 → 1.0

      const isBeat = analysis.beats.has(i);
      const x = i * barStep;

      if (isBeat) {
        ctx.save();
        ctx.shadowColor = 'rgba(167, 139, 250, 0.7)';
        ctx.shadowBlur = 8;
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, 1)`;
        drawRoundedRect(ctx, x, mid - barH, barW, barH * 2, 1);
        ctx.fill();
        ctx.restore();
      } else {
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${a.toFixed(2)})`;
        drawRoundedRect(ctx, x, mid - barH, barW, barH * 2, 1);
        ctx.fill();
      }
    }
  }

  // --- Selection overlay ---
  function updateSelectionOverlay() {
    if (!audioDuration) return;
    const wrapper = $('waveform-wrapper');
    const sel = $('waveform-selection');
    const w = wrapper.clientWidth;
    const target = Math.min(getClipDuration(), audioDuration);

    const leftPx = (audioStartOffset / audioDuration) * w;
    const widthPx = (target / audioDuration) * w;
    sel.style.left = leftPx + 'px';
    sel.style.width = Math.min(widthPx, w - leftPx) + 'px';

    $('waveform-start-time').textContent = formatTime(audioStartOffset);
    $('waveform-end-time').textContent = formatTime(audioStartOffset + target);
  }

  // --- Waveform drag ---
  function setupWaveformDrag() {
    const wrapper = $('waveform-wrapper');

    function getX(e) {
      if (e.touches) return e.touches[0].clientX;
      return e.clientX;
    }

    function onStart(e) {
      if (audioMode !== 'manual') return;
      isDragging = true;
      dragStartX = getX(e);
      dragStartOffset = audioStartOffset;
      e.preventDefault();
    }

    function onMove(e) {
      if (!isDragging) return;
      const dx = getX(e) - dragStartX;
      const w = wrapper.clientWidth;
      const secPerPx = audioDuration / w;
      const target = Math.min(getClipDuration(), audioDuration);
      const maxOffset = Math.max(0, audioDuration - target);
      audioStartOffset = Math.max(0, Math.min(maxOffset, dragStartOffset + dx * secPerPx));
      updateSelectionOverlay();
      e.preventDefault();
    }

    function onEnd() {
      if (!isDragging) return;
      isDragging = false;
      previewAudioAt(audioStartOffset);
    }

    wrapper.addEventListener('mousedown', onStart);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onEnd);
    wrapper.addEventListener('touchstart', onStart, { passive: false });
    window.addEventListener('touchmove', onMove, { passive: false });
    window.addEventListener('touchend', onEnd);
  }

  // --- Audio preview ---
  function previewAudioAt(startSec) {
    const audio = $('audio-preview');
    if (!audio.src) return;
    if (previewTimeout) { clearTimeout(previewTimeout); previewTimeout = null; }
    audio.currentTime = startSec;
    audio.play().catch(() => {});
    isPreviewPlaying = true;
    $('preview-btn').textContent = 'Pause';
    previewTimeout = setTimeout(() => { pausePreview(); }, getClipDuration() * 1000);
  }

  function pausePreview() {
    const audio = $('audio-preview');
    audio.pause();
    if (previewTimeout) { clearTimeout(previewTimeout); previewTimeout = null; }
    isPreviewPlaying = false;
    $('preview-btn').textContent = 'Preview';
  }

  // --- Auto/Manual toggle ---
  function setupAudioModeToggle() {
    const radios = document.querySelectorAll('input[name="audio-mode"]');
    radios.forEach(r => r.addEventListener('change', function() {
      audioMode = this.value;
      if (audioMode === 'manual') {
        $('waveform-container').classList.add('visible');
        // Redraw now that container is visible (has dimensions)
        requestAnimationFrame(function() { drawWaveform(); updateSelectionOverlay(); });
      } else {
        $('waveform-container').classList.remove('visible');
        audioStartOffset = 0;
        pausePreview();
        updateSelectionOverlay();
      }
    }));
  }

  // --- Duration change listeners ---
  function setupDurationListener() {
    $('duration').addEventListener('input', function() {
      if (!audioDuration) return;
      const target = Math.min(getTargetDuration(), audioDuration);
      const maxOffset = Math.max(0, audioDuration - target);
      audioStartOffset = Math.min(audioStartOffset, maxOffset);
      updateSelectionOverlay();
    });
  }

  function setupClipDurationListener() {
    $('clip-duration').addEventListener('input', function() {
      if (!audioDuration) return;
      // Clamp value to [1, audioDuration]
      let val = parseFloat(this.value) || 1;
      val = Math.max(1, Math.min(val, audioDuration));
      this.value = val;
      // Re-clamp audioStartOffset
      const maxOffset = Math.max(0, audioDuration - val);
      audioStartOffset = Math.min(audioStartOffset, maxOffset);
      updateSelectionOverlay();
    });
  }

  // --- Upload Videos ---
  async function handleVideos(files) {
    if (!jobId) { setStatus('video-status', 'Upload audio first to create a job', false); return; }
    setStatus('video-status', `Uploading ${files.length} clip(s)...`, true);
    try {
      for (const file of files) {
        const form = new FormData();
        form.append('file', file);
        const res = await fetch(`/api/v1/upload/video?job_id=${jobId}`, { method: 'POST', body: form });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || data.message || 'Upload failed');
        clipCount = data.clip_count;
      }
      setStatus('video-status', `${clipCount} clip(s) uploaded`, true);
    } catch (e) {
      setStatus('video-status', e.message, false);
    }
    updateCreateBtn();
  }

  // --- Process ---
  async function createReel() {
    const btn = $('create-btn');
    btn.disabled = true;
    setStatus('process-status', '', true);
    $('download-section').classList.remove('visible');

    const prefs = {
      pacing: $('pacing').value,
      style: $('style').value,
      transition_type: $('transition').value,
    };
    const dur = $('duration').value;
    if (dur) prefs.target_duration = parseFloat(dur);

    // Add manual audio_start if in manual mode
    if (audioMode === 'manual') {
      prefs.audio_start = audioStartOffset;
    }

    try {
      const res = await fetch('/api/v1/process', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ job_id: jobId, preferences: prefs }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || data.message || 'Process failed');
      setStatus('process-status', 'Processing started...', true);
      $('progress-section').classList.add('visible');
      startPolling();
    } catch (e) {
      setStatus('process-status', e.message, false);
      btn.disabled = false;
    }
  }

  // --- Polling ---
  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollStatus, 2000);
    pollStatus();
  }

  async function pollStatus() {
    try {
      const res = await fetch(`/api/v1/status/${jobId}`);
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || 'Status check failed');

      const pct = Math.round(data.progress * 100);
      $('progress-bar').style.width = pct + '%';
      $('progress-pct').textContent = pct + '%';
      $('progress-stage').textContent = formatStage(data.stage);
      $('progress-msg').textContent = data.message || '';
      $('progress-msg').className = 'status-msg ok';

      if (data.stage === 'complete') {
        clearInterval(pollTimer);
        pollTimer = null;
        $('progress-bar').style.width = '100%';
        $('progress-pct').textContent = '100%';
        $('progress-msg').textContent = 'Reel complete!';
        $('download-link').href = `/api/v1/download/${jobId}`;
        $('download-section').classList.add('visible');
      } else if (data.stage === 'failed' || data.stage === 'cancelled') {
        clearInterval(pollTimer);
        pollTimer = null;
        $('progress-msg').textContent = data.error || `Processing ${data.stage}`;
        $('progress-msg').className = 'status-msg err';
        $('create-btn').disabled = false;
      }
    } catch (e) {
      $('progress-msg').textContent = e.message;
      $('progress-msg').className = 'status-msg err';
    }
  }

  function formatStage(s) {
    return s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  }

  // --- Window resize ---
  window.addEventListener('resize', function() {
    if (audioBuffer) {
      drawWaveform();
      updateSelectionOverlay();
    }
  });

  // --- Init ---
  setupDrop('audio-drop', 'audio-input', handleAudio);
  setupDrop('video-drop', 'video-input', handleVideos);
  $('create-btn').addEventListener('click', createReel);
  $('preview-btn').addEventListener('click', function() {
    if (isPreviewPlaying) { pausePreview(); } else { previewAudioAt(audioStartOffset); }
  });
  setupAudioModeToggle();
  setupWaveformDrag();
  setupDurationListener();
  setupClipDurationListener();
})();
</script>
</body>
</html>
